<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Women's Health Analyzer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0f0a1e 0%, #1a1530 100%);
            color: #f3e8ff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(31, 24, 47, 0.8);
            border: 2px solid #c084fc;
            border-radius: 15px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(192, 132, 252, 0.2);
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #c084fc;
            font-size: 28px;
        }
        
        .section {
            margin-bottom: 30px;
        }
        
        .section h2 {
            font-size: 18px;
            margin-bottom: 15px;
            color: #c084fc;
            border-bottom: 1px solid #c084fc;
            padding-bottom: 10px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #f3e8ff;
        }
        
        input, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #c084fc;
            border-radius: 8px;
            color: #f3e8ff;
            font-size: 14px;
        }
        
        input::placeholder, textarea::placeholder {
            color: rgba(243, 232, 255, 0.5);
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: #c084fc;
            color: #0f0a1e;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        
        button:hover {
            background: #e0b3ff;
            transform: translateY(-2px);
        }
        
        .result {
            background: rgba(192, 132, 252, 0.1);
            border: 1px solid #c084fc;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            display: none;
        }
        
        .result.show {
            display: block;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .result-item {
            margin: 10px 0;
        }
        
        .result-label {
            color: #c084fc;
            font-weight: bold;
        }
        
        .result-value {
            color: #f3e8ff;
        }
        
        .error {
            color: #ff6b6b;
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid #ff6b6b;
            border-radius: 8px;
            padding: 12px;
            margin-top: 10px;
            display: none;
        }
        
        .error.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏥 Women's Health Analyzer</h1>
        
        <!-- Section 1: Symptom Analyzer -->
        <div class="section">
            <h2>📋 Symptom Analysis</h2>
            <label for="symptom">Enter your symptoms:</label>
            <textarea id="symptom" placeholder="e.g., stress anxiety, weight gain, headache..." rows="3"></textarea>
            <button onclick="analyzeSyntoms()">Analyze Symptom</button>
        </div>
        
        <!-- Section 2: BMI Calculator -->
        <div class="section">
            <h2>⚖️ BMI Calculator</h2>
            <label for="weight">Weight (kg):</label>
            <input type="number" id="weight" placeholder="e.g., 60" step="0.1">
            
            <label for="height">Height (m):</label>
            <input type="number" id="height" placeholder="e.g., 1.65" step="0.01">
            
            <button onclick="calculateBMI()">Calculate BMI</button>
        </div>
        
        <!-- Results -->
        <div id="result" class="result">
            <div id="resultContent"></div>
        </div>
        
        <div id="error" class="error">
            <span id="errorMessage"></span>
        </div>
    </div>

    <script>
        async function analyzeSyntoms() {
            const symptom = document.getElementById('symptom').value;
            const resultDiv = document.getElementById('result');
            const errorDiv = document.getElementById('error');
            
            if (!symptom.trim()) {
                showError('Please enter a symptom');
                return;
            }
            
            try {
                const response = await fetch('/api/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ symptom: symptom })
                });
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    document.getElementById('resultContent').innerHTML = `
                        <div class="result-item">
                            <span class="result-label">Symptom:</span>
                            <span class="result-value">${data.symptom}</span>
                        </div>
                        <div class="result-item">
                            <span class="result-label">Recommended Solution:</span>
                            <span class="result-value">${data.recommendation}</span>
                        </div>
                    `;
                    resultDiv.classList.add('show');
                    errorDiv.classList.remove('show');
                } else {
                    showError(data.error || 'Error analyzing symptom');
                }
            } catch (error) {
                showError('Error: ' + error.message);
            }
        }
        
        async function calculateBMI() {
            const weight = document.getElementById('weight').value;
            const height = document.getElementById('height').value;
            const resultDiv = document.getElementById('result');
            const errorDiv = document.getElementById('error');
            
            if (!weight || !height) {
                showError('Please enter both weight and height');
                return;
            }
            
            try {
                const response = await fetch('/api/bmi', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ weight: parseFloat(weight), height: parseFloat(height) })
                });
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    let bmiCategory = '';
                    if (data.bmi < 18.5) bmiCategory = 'Underweight';
                    else if (data.bmi < 25) bmiCategory = 'Normal weight';
                    else if (data.bmi < 30) bmiCategory = 'Overweight';
                    else bmiCategory = 'Obese';
                    
                    document.getElementById('resultContent').innerHTML = `
                        <div class="result-item">
                            <span class="result-label">Weight:</span>
                            <span class="result-value">${data.weight} kg</span>
                        </div>
                        <div class="result-item">
                            <span class="result-label">Height:</span>
                            <span class="result-value">${data.height} m</span>
                        </div>
                        <div class="result-item">
                            <span class="result-label">BMI:</span>
                            <span class="result-value">${data.bmi}</span>
                        </div>
                        <div class="result-item">
                            <span class="result-label">Category:</span>
                            <span class="result-value">${bmiCategory}</span>
                        </div>
                    `;
                    resultDiv.classList.add('show');
                    errorDiv.classList.remove('show');
                } else {
                    showError(data.error || 'Error calculating BMI');
                }
            } catch (error) {
                showError('Error: ' + error.message);
            }
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('error');
            document.getElementById('errorMessage').textContent = message;
            errorDiv.classList.add('show');
            document.getElementById('result').classList.remove('show');
        }
    </script>
</body>
</html>
